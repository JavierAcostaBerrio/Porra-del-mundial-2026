<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Porra del Mundial de fútbol 2026</title>

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="cabecera-mundial">
  <div class="cabecera-contenido">
    <h1>La porra del Mundial 2026</h1>
    <img src="images/cabecera-mundial-2026.png" alt="" class="logo-fifa">
  </div>
</header>


    <!-- CLASIFICACIÓN GENERAL -->
    <section class="card" id="clasificacion">
        <h2>Clasificación General</h2>

        <!-- AQUÍ SE PINTA LA TABLA -->
        <div class="tabla-scroll">
        <table id="tabla"></table>
        </div>
    </section>

    <!-- GOLEADORES -->
    <section class="card" id="goleadores">
        <h2>Goleadores</h2>
        <canvas id="goleadoresChart"></canvas>
    </section>

    <!-- ESTADÍSTICAS -->
    <section class="card" id="estadisticas">
        <h2>Estadísticas</h2>
        <div id="stats"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tus scripts -->
    <script src="js/sheet.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
