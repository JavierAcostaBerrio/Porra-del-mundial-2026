<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Porra del Mundial 2026</title>

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="cabecera-mundial">
    <div class="cabecera-contenido">
    <img src="images/cabecera-mundial.jpg" alt="" class="cabecera-mundial">
    </div>
</header>

<!-- SECCIÓN BIENVENIDA -->
  <section>
    <h2>Comprueba tu evolución en la porra del Mundial 2026</h2>
    <p>
      Las puntuaciones se actualizan al finalizar todos los partido del día.
    </p>
  </section>

    <!-- CLASIFICACIÓN GENERAL -->
    <section class="card" id="clasificacion">
        <h2>Clasificación General</h2>

        <!-- AQUÍ SE PINTA LA TABLA -->
        <div class="tabla-scroll">
        <table id="tabla"></table>
        </div>
    </section>

    <!-- GOLEADORES -->
    <section class="card" id="goleadores">
        <h2>Goleadores</h2>
        <canvas id="goleadoresChart"></canvas>
    </section>

    <!-- ESTADÍSTICAS -->
    <section class="card" id="estadisticas">
        <h2>Estadísticas</h2>
        <div id="stats"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tus scripts -->
    <script src="js/sheet.js"></script>
    <script src="js/main.js"></script>

    <!-- FOOTER -->
  <footer>
    La porra del Mundial 2026 · Creada para disfrutar del fútbol entre amigos
  </footer>
</body>
</html>
